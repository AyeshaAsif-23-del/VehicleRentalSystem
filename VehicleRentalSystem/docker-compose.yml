version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: rental_db
    environment:
      MYSQL_DATABASE: 'VehicleRental'
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306" 
    volumes:
      - ./db_init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: rental_app
    depends_on:
      - db
    stdin_open: true
    tty: true